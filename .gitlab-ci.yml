stages: [test, build, deploy]
 
variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
 
test:
  stage: test
  image: python:3.11-slim
  services: [postgres:15]
  variables:
    POSTGRES_DB: payment_test
    POSTGRES_USER: payment
    POSTGRES_PASSWORD: secret
    DATABASE_URL: postgresql://payment:secret@postgres/payment_test
  before_script:
    - pip install -r requirements.txt
  script:
    - pytest -q --maxfail=1
  rules:
    - if: $CI_COMMIT_BRANCH
build:
  stage: build
  image: docker:24.0
  services: [docker:24.0-dind]
  needs: [test]
  before_script:
    - docker login -u $CI_REGISTRY_USER \
        -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
 
deploy:
  stage: deploy
  image: alpine:3.19
  needs: [build]
  environment: { name: production }
  script:
    - ./scripts/deploy.sh $IMAGE_TAG
  when: manual        # validation humaine
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
