name: CI/CD payment-api

# Le pipeline se declenche automatiquement a chaque push et sur les pull requests.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  # ---------- 1) TESTS : sur toutes les branches ----------
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Lancer les tests
        run: pytest -q

  # ---------- 2) BUILD : uniquement sur main, si les tests passent ----------
  build:
    name: Build & push image Docker
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4

      - name: Nom d'image en minuscules (exige par GHCR)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Connexion au registry GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construire et publier l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

  # ---------- 3) DEPLOY : validation manuelle obligatoire ----------
  deploy:
    name: Deploiement (validation manuelle)
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Le gate : ce job attend l'approbation d'un reviewer configure
    # dans Settings -> Environments -> production (voir README).
    environment: production
    steps:
      - name: Deployer en production
        run: |
          echo "Deploiement de ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}"
          echo "Ici : appel au serveur (ssh/kubectl/script de deploiement)."
